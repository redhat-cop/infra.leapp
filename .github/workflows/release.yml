---
# Runs when a pull request labeled `release-on-merge` is merged to the default branch.
# Creates the version tag and GitHub release (CHANGELOG.rst + collection .tar.gz), then
# publishes the collection to Ansible Galaxy.
name: Release

on:
  pull_request:
    types:
      - closed

permissions:
  contents: write

jobs:
  infra_release:
    if: >-
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'release-on-merge') &&
      github.event.pull_request.base.ref == github.event.repository.default_branch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Read version from galaxy.yml
        id: meta
        run: |
          v=$(grep -E '^version:' galaxy.yml | awk '{print $2}')
          echo "version=${v}" >> "${GITHUB_OUTPUT}"
          echo "Collection version: ${v}"

      - name: Install Ansible
        run: pip install --upgrade ansible-core

      - name: Build collection
        run: ansible-galaxy collection build -vvv
        shell: bash
        working-directory: ${{ github.workspace }}

      - name: Get tar name
        run: echo "tar_file=$(ls | grep '.tar')" >> $GITHUB_OUTPUT
        id: build

      - name: Verify tarball installs (ansible-galaxy collection install)
        run: ansible-galaxy collection install ./infra-leapp-${{ steps.meta.outputs.version }}.tar.gz -p /home/runner/collections
        shell: bash
        working-directory: ${{ github.workspace }}

      - name: Create tag and GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git ls-remote --exit-code --tags origin "refs/tags/${VERSION}" >/dev/null 2>&1; then
            echo "Tag ${VERSION} already exists; skipping tag and release."
            exit 1
          fi
          git tag -a "${VERSION}" -m "Release collection ${VERSION}"
          git push origin "refs/tags/${VERSION}"
          gh release create "${VERSION}" \
            --title "infra.leapp ${VERSION}" \
            --notes-file CHANGELOG.rst \
            --verify-tag \
            "${{ steps.build.outputs.tar_file }}"

      - name: Publish to Ansible Galaxy
        run: ansible-galaxy collection publish --api-key=${{ secrets.GALAXY_INFRA_KEY }} ${{ steps.build.outputs.tar_file }}

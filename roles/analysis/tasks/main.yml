---
- name: Ensure ansible_facts used by role
  ansible.builtin.include_role:
    name: infra.leapp.common
    tasks_from: set_facts.yml
  vars:
    __leapp_role_required_facts: "{{ __leapp_analysis_required_facts }}"
    __leapp_role_required_facts_subsets: "{{ __leapp_analysis_required_facts_subsets }}"

- name: Record role begin fingerprint
  infra.leapp.sr_fingerprint:
    sr_message: >-
      begin infra.leapp:analysis ansible_version={{ ansible_version.full }}
      {{ ansible_facts['distribution'] }}-{{ ansible_facts['distribution_version'] }}

# If we store timestamp variable in vars, it  is processed dynamically at
# runtime, hence timestamp changes on each variable invocation. We want the
# timestamp to be stable so that logs are stored in the same directory.
- name: Lock timestamped variables
  ansible.builtin.set_fact:
    __leapp_timestamp: "{{ now(fmt='%Y-%m-%d_%H-%M-%S', utc=true) }}"

- name: Initialize lock, logging, and common vars
  ansible.builtin.include_role:
    name: infra.leapp.common
    tasks_from: init_leapp_log.yml
    public: true
  vars:
    job_name: Ansible Leapp preupgrade analysis
    leapp_reports_dir: "{{ __leapp_reports_dir }}"
    leapp_log_file: "{{ __leapp_log_file }}"

- name: Include tasks for preupg assistant analysis
  ansible.builtin.include_tasks: analysis-preupg-el6.yml
  when: ansible_facts["distribution_major_version"]|int == 6

- name: Include tasks for leapp preupgrade analysis
  ansible.builtin.include_tasks: analysis-leapp.yml
  when: ansible_facts["distribution_major_version"]|int >= 7

- name: Set stats for leapp_inhibitors
  ansible.builtin.set_stats:
    data:
      leapp_inhibitors: "{{ leapp_inhibitors | default([]) }}"

- name: Notify analysis report is done handler
  ansible.builtin.assert:
    that: true
    quiet: true
  changed_when: true
  notify: Preupgrade analysis report is done

- name: Record role success fingerprint
  infra.leapp.sr_fingerprint:
    sr_message: >-
      success infra.leapp:analysis ansible_version={{ ansible_version.full }}
      {{ ansible_facts['distribution'] }}-{{ ansible_facts['distribution_version'] }}
...
